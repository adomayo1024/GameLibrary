name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: sudo apt-get update && sudo apt-get install -y cmake g++ make

      - name: Build mit CMake
        run: mkdir -p build
            cd build
            cmake ..
            make

      - name: Test durchfueren
        run:
            cd build
            ctest --output-on-failure || echo "Kein Test vorhanden"

